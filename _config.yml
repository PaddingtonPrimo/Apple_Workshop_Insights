# Prevent the branch-based Jekyll deployment from overwriting the
# Vite-built site deployed by the GitHub Actions workflow.
# Excluding all source files causes Jekyll to produce an empty _site,
# which makes upload-pages-artifact fail and stops the Jekyll deployment.
exclude:
  - index.html
  - app.jsx
  - package.json
  - package-lock.json
  - vite.config.js
  - README.md
  - node_modules
  - dist
